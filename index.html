<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🍅番茄的隨機抽歌單</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍅</text></svg>">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at top left, #ffe0e8 0, transparent 32%),
        radial-gradient(circle at bottom right, #dcecff 0, transparent 30%),
        #fff7f1;
      color: #2d2433;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: min(720px, 100%);
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(91, 56, 38, 0.14);
      padding: 28px;
      backdrop-filter: blur(10px);
    }

    .title {
      text-align: center;
      margin-bottom: 22px;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: 1px;
    }

    .title p {
      margin: 10px 0 0;
      color: #7d6b76;
      font-size: 15px;
    }

    .panel {
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      border: 1px solid #f1e5dc;
      margin-bottom: 18px;
    }

    .result {
      min-height: 190px;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .song-name {
      font-size: clamp(36px, 9vw, 68px);
      font-weight: 900;
      line-height: 1.05;
      margin: 0 0 14px;
      color: #d34a36;
    }

    .singer {
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 700;
      margin: 0 0 18px;
      color: #3c3340;
    }

    .tags {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #fff2d8;
      color: #8a5a00;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .controls {
      display: grid;
      gap: 14px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    select, input {
      width: 100%;
      border: 1px solid #eadbd2;
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 16px;
      background: #fff;
      color: #2d2433;
      outline: none;
    }

    select:focus, input:focus {
      border-color: #d34a36;
      box-shadow: 0 0 0 4px rgba(211, 74, 54, 0.12);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .draw {
      background: #d34a36;
      color: white;
      box-shadow: 0 10px 24px rgba(211, 74, 54, 0.28);
    }

    .reset {
      background: #f2ebe7;
      color: #5d4c55;
    }

    .info {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #82727c;
      line-height: 1.7;
    }

    .history {
      margin-top: 18px;
      background: #fff;
      border-radius: 20px;
      padding: 18px;
      border: 1px solid #f1e5dc;
    }

    .history h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .history-item {
      background: #f8f3ef;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .loading {
      color: #82727c;
      font-size: 18px;
      font-weight: 700;
    }

    @media (max-width: 600px) {
      .app {
        padding: 20px;
        border-radius: 22px;
      }

      .filters, .buttons {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="title">
      <h1>🍅 番茄的隨機抽歌單</h1>
      <p>多吃番茄身體好</p>
    </section>

    <section class="panel result">
      <div id="resultBox">
        <div class="loading">歌單載入中...</div>
      </div>
    </section>

    <section class="panel controls">
      <div class="filters">
        <select id="categoryFilter">
          <option value="">全部分類</option>
        </select>

        <input id="keywordInput" type="search" placeholder="搜尋歌名 / 歌手 / 分類">
      </div>

      <div class="buttons">
        <button class="draw" onclick="drawSong()">🎲 抽一首歌</button>
        <button class="reset" onclick="resetHistory()">清除已抽紀錄</button>
      </div>

      <div class="info" id="infoText">讀取中...</div>
    </section>

    <section class="history">
      <h2>最近抽到</h2>
      <div class="history-list" id="historyList">
        <span class="history-item">尚未抽歌</span>
      </div>
    </section>
  </main>

  <script>
    const SHEET_ID = "1ZQCwC2hJ8Cqxhdx03-4k3ny4wZ8q5jnIZRonrm1vt1A";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=工作表1`;

    let songs = [];
    let drawnKeys = new Set();
    let history = [];

    const resultBox = document.getElementById("resultBox");
    const categoryFilter = document.getElementById("categoryFilter");
    const keywordInput = document.getElementById("keywordInput");
    const infoText = document.getElementById("infoText");
    const historyList = document.getElementById("historyList");

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          field += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(field);
          field = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (field || row.length) {
            row.push(field);
            rows.push(row);
            row = [];
            field = "";
          }
          if (char === "\r" && next === "\n") i++;
        } else {
          field += char;
        }
      }

      if (field || row.length) {
        row.push(field);
        rows.push(row);
      }

      return rows;
    }

    function normalizeCategory(value) {
      return String(value || "")
        .split(/[，,、]/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    async function loadSongs() {
      try {
        const response = await fetch(CSV_URL + "&cache=" + Date.now());
        const csvText = await response.text();
        const rows = parseCSV(csvText);

        songs = rows
          .slice(1)
          .map(row => ({
            name: (row[0] || "").trim(),
            singer: (row[1] || "").trim(),
            categories: normalizeCategory(row[2])
          }))
          .filter(song => song.name);

        buildCategoryOptions();
        renderReady();
      } catch (error) {
        resultBox.innerHTML = `
          <div>
            <p class="song-name">讀取失敗</p>
            <p class="singer">請確認試算表共用權限為「知道連結的任何人可查看」</p>
          </div>
        `;
        infoText.textContent = "無法讀取 Google 試算表。";
      }
    }

    function buildCategoryOptions() {
      const categorySet = new Set();
      songs.forEach(song => song.categories.forEach(cat => categorySet.add(cat)));

      [...categorySet].sort((a, b) => a.localeCompare(b, "zh-Hant")).forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        categoryFilter.appendChild(option);
      });
    }

    function getFilteredSongs() {
      const category = categoryFilter.value;
      const keyword = keywordInput.value.trim().toLowerCase();

      return songs.filter(song => {
        const matchCategory = !category || song.categories.includes(category);
        const haystack = `${song.name} ${song.singer} ${song.categories.join(" ")}`.toLowerCase();
        const matchKeyword = !keyword || haystack.includes(keyword);
        return matchCategory && matchKeyword;
      });
    }

    function renderReady() {
      resultBox.innerHTML = `
        <div>
          <p class="song-name">準備好了</p>
          <p class="singer">按下按鈕開始抽歌</p>
        </div>
      `;
      infoText.textContent = `目前共讀取 ${songs.length} 首歌。可用分類篩選後再抽。`;
    }

    function songKey(song) {
      return `${song.name}__${song.singer}`;
    }

    function drawSong() {
      const pool = getFilteredSongs();
      if (!pool.length) {
        resultBox.innerHTML = `
          <div>
            <p class="song-name">沒有歌曲</p>
            <p class="singer">請換分類或關鍵字</p>
          </div>
        `;
        return;
      }

      let available = pool.filter(song => !drawnKeys.has(songKey(song)));

      if (!available.length) {
        drawnKeys.clear();
        available = pool;
      }

      const song = available[Math.floor(Math.random() * available.length)];
      drawnKeys.add(songKey(song));

      history.unshift(song);
      history = history.slice(0, 10);

      resultBox.innerHTML = `
        <div>
          <p class="song-name">${escapeHTML(song.name)}</p>
          <p class="singer">${escapeHTML(song.singer || "未填歌手")}</p>
          <div class="tags">
            ${song.categories.map(cat => `<span class="tag">${escapeHTML(cat)}</span>`).join("")}
          </div>
        </div>
      `;

      renderHistory();
      infoText.textContent = `目前篩選結果：${pool.length} 首｜已抽過：${drawnKeys.size} 首。`;
    }

    function renderHistory() {
      if (!history.length) {
        historyList.innerHTML = '<span class="history-item">尚未抽歌</span>';
        return;
      }

      historyList.innerHTML = history
        .map(song => `<span class="history-item">${escapeHTML(song.name)}｜${escapeHTML(song.singer)}</span>`)
        .join("");
    }

    function resetHistory() {
      drawnKeys.clear();
      history = [];
      renderHistory();
      infoText.textContent = `已清除紀錄。目前共讀取 ${songs.length} 首歌。`;
    }

    function escapeHTML(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    categoryFilter.addEventListener("change", () => {
      const count = getFilteredSongs().length;
      infoText.textContent = `目前篩選結果：${count} 首。`;
    });

    keywordInput.addEventListener("input", () => {
      const count = getFilteredSongs().length;
      infoText.textContent = `目前篩選結果：${count} 首。`;
    });

    loadSongs();
  </script>
</body>
</html>
